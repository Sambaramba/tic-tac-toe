<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="/javascript/main.js" defer></script>
</head>
<body>

<div id="container">
    <div id="title">Tic-tac-toe</div>
    <div id="scoreboard">Scoreboard</div>
    <div id="game-buttons">
        <button type="button">Start</button>
        <button type="button">Reset</button>
    </div>
    <div id="gameboard">
        <div id="grid-container">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>
    </div>
    <div id="display">"This is the game over display"</div>
</div>
</body>
</html>

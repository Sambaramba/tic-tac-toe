<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="/javascript/main.js" defer></script>
</head>
<body>
    <div id="container">
        <div id="title">Tic-tac-toe</div>
        <div id="scoreboard">Scoreboard</div>
        <div id="game-buttons">
            <button type="button">Start</button>
            <button type="button">Reset</button>
        </div>
        <div id="gameboard">
            <div id="cell1" class="cell">X</div>
            <div id="cell2" class="cell">O</div>
            <div id="cell3" class="cell">X</div>
            <div id="cell4" class="cell">O</div>
            <div id="cell5" class="cell">X</div>
            <div id="cell6" class="cell">O</div>
            <div id="cell7" class="cell">X</div>
            <div id="cell8" class="cell">O</div>
            <div id="cell9" class="cell">X</div>
        </div>
        <div id="display">"This is the game over display"</div>
    </div>
</body>
</html>

    <dialog id="select-name-dialog" >
        <form action="javascript/main.js" method="dialog">
            <label for="username-choice">Player 1 please choose your name</label>
            <input id="username-choice" type="text">
            <button type="button">Submit</button>
        </form>
    </dialog>
    <dialog id="select-symbol-dialog">
        <form action="javascript/main.js">
            <fieldset>
                <legend>Please select a symbol</legend>
                <div id="radio-container">
                    <input type="radio" name="choose-symbol" value="X" required>
                    <label class="radio-label">X</label>

                    <input type="radio" name="choose-symbol" value="O" required>
                    <label class="radio-label">O</label>
                </div>
            </fieldset>
            <button type="button">confirm</button>
        </form>
    </dialog>
